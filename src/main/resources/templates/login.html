<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('MovieVerse')"></head>

<body>

<th:block th:replace="fragments/header :: header"></th:block>

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-card">
            <!-- Mensajes de éxito o error al registrarse o iniciar sesión -->
            <div th:if="${param.registered}"
                 class="auth-message success-message">
                <i class="bi bi-check-circle-fill"></i>
                <span>
                    Registro completado correctamente.
                    Ya puedes iniciar sesión.
                </span>
            </div>
            <div th:if="${param.error}"
                 class="auth-message error-message">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span>
                    Usuario o contraseña incorrectos.
                </span>
            </div>

            <h1 class="auth-title">Iniciar sesión</h1>

            <form method="post" action="/login" class="auth-form">

                <div class="input-group">
                    <i class="bi bi-person"></i>
                    <input type="text" name="username" placeholder="Usuario" required>
                </div>

                <div class="input-group">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="password" placeholder="Contraseña" required>
                </div>

                <!-- Token CSRF para seguridad -->
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <!-- Si se redirige a esta página después de intentar acceder a una página protegida, se incluye el parámetro "redirect" -->
                <input type="hidden" name="redirect" th:value="${param.redirect}" />

                <button type="submit" class="btn-pill btn-login-main">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Entrar
                </button>

                <div class="remember-me">
                    <input type="checkbox" name="remember-me" id="remember-me">
                    <label for="remember-me">Recuérdame</label>
                </div>

            </form>

            <div class="auth-footer">
                <span>¿No tienes cuenta?</span>
                <a href="/register">Regístrate</a>
            </div>

        </div>

    </div>
</section>
<footer th:replace="fragments/footer :: footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/carousel.js}"></script>
<script th:src="@{/js/main.js}"></script>
<th:block th:replace="~{fragments/trailer-modal :: trailerModal}"></th:block>
</body>
</html>
