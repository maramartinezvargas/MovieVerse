<!DOCTYPE html>

<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Dashboard')"></head>

<link rel="stylesheet" th:href="@{/css/dashboard.css}">

<body>

<th:block th:replace="fragments/header :: header"></th:block>

<!-- HERO -->
<section class="dashboard-hero">

    <div class="container">

        <div class="dashboard-hero-content">

            <span class="dashboard-badge">
                Panel de moderación
            </span>

            <h1 class="dashboard-title">
                Dashboard
            </h1>

            <p class="dashboard-subtitle">
                Gestiona reportes y supervisa la actividad
                de moderación de MovieVerse.
            </p>

        </div>

    </div>

</section>

<!-- STATS -->
<section class="dashboard-stats">

    <div class="container">

        <div class="stats-grid">

            <div class="dashboard-stat-card">

                <span class="stat-value"
                      th:text="${#lists.size(reports)}">
                </span>

                <span class="stat-label">
                    Reportes totales
                </span>

            </div>

            <div class="dashboard-stat-card">

                <span class="stat-value"
                      th:text="${reports.^[status.name() == 'PENDING'] != null ?
                      #lists.size(reports.?[status.name() == 'PENDING']) : 0}">
                </span>

                <span class="stat-label">
                    Pendientes
                </span>

            </div>

            <div class="dashboard-stat-card">

                <span class="stat-value"
                      th:text="${reports.^[status.name() == 'RESOLVED'] != null ?
                      #lists.size(reports.?[status.name() == 'RESOLVED']) : 0}">
                </span>

                <span class="stat-label">
                    Resueltos
                </span>

            </div>

        </div>

    </div>

</section>

<!-- REPORTS -->
<section class="dashboard-section">

    <div class="container">

        <div class="section-header">

            <h2 class="section-title">
                Reportes
            </h2>

        </div>

        <div th:if="${#lists.isEmpty(reports)}"
             class="dashboard-empty">

            <i class="bi bi-shield-check"></i>

            <p>
                No hay reportes pendientes.
            </p>

        </div>

        <div class="reports-table-wrapper"
             th:if="${!#lists.isEmpty(reports)}">

            <table class="reports-table">

                <thead>

                <tr>
                    <th>ID</th>
                    <th>Review</th>
                    <th>Reporter</th>
                    <th>Usuario reportado</th>
                    <th>Motivo</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                </tr>

                </thead>

                <tbody>

                <tr th:each="report : ${reports}">

                    <td th:text="${report.id}"></td>

                    <td th:text="${report.reviewId}"></td>

                    <td th:text="${report.reporterUsername}"></td>

                    <td th:text="${report.reportedUsername}"></td>

                    <td class="reason-cell"
                        th:text="${report.reason}">
                    </td>

                    <td>

                        <span class="status-badge"
                              th:classappend="${report.status.name().toLowerCase()}"

                              th:text="${report.status}">
                        </span>

                    </td>

                    <td th:text="${#temporals.format(
                        report.createdAt,
                        'dd/MM/yyyy HH:mm'
                    )}">
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</section>

<footer th:replace="fragments/footer :: footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>

</html>
