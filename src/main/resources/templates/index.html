<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('MovieVerse')"></head>

<body>

<th:block th:replace="fragments/header :: header"></th:block>

<!-- HERO -->
<section class="hero" th:if="${featured != null and featured.backdropPath != null}"
         th:style="|--hero-bg: url('${featured.backdropPath}')|">

    <div class="container">
        <div class="hero-content">
            <span class="hero-badge">
                <i class="bi bi-fire"></i>
                Destacado
            </span>
            <h1 class="hero-title" th:text="${featured.title}"></h1>

            <div class="hero-meta">
                <span class="rating">
                    <i class="bi bi-star-fill"></i>
                    <span class="rating-value" th:text="${featured.voteAverageFormatted}"></span>
                    <span class="rating-count">
                        (<span th:text="${featured.voteCount}"></span>)
                    </span>
                </span>
                <span class="release-date"
                      th:if="${featured.releaseDate != null and !#strings.isEmpty(featured.releaseDate)}"
                      th:text="${featured.formattedReleaseDate}">
                </span>
                <span class="genre"
                      th:each="genre : ${featured.genres}"
                      th:text="${genre}">
                </span>
            </div>

            <p class="hero-overview" th:text="${featured.overview}"></p>

            <div class="hero-actions">
                <a th:href="@{/peliculas/{id}(id=${featured.id})}"
                   class="btn-pill btn-details">
                    <i class="bi bi-info-circle"></i>
                    Ver detalles
                </a>
                <button
                        class="btn-pill btn-action open-trailer"
                        th:if="${featured.trailerKey != null}"
                        th:attr="data-trailer=${featured.trailerKey}"
                        data-bs-toggle="modal"
                        data-bs-target="#trailerModal">

                    <i class="bi bi-play-fill"></i>
                    Ver tráiler
                </button>
            </div>
        </div>
    </div>
</section>

<!-- SERIES TRENDING -->
<section class="carousel-section">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Series en tendencia</h2>
            <div class="carousel-controls">
                <button class="carousel-btn prev">‹</button>
                <button class="carousel-btn next">›</button>
            </div>
        </div>

        <div class="carousel" id="top-tv-carousel">
            <a th:href="@{/series/{id}(id=${show.id})}" class="carousel-card"
               th:each="show, iterStat : ${tvShows}">
                <div class="rank-badge" th:text="${iterStat.count}"></div>
                <img th:src="${show.posterPath}" th:alt="${show.title}">
                <div class="card-meta">
                    <span>
                        <i class="bi bi-star-fill"></i>
                        <span class="rating-value" th:text="${show.voteAverageFormatted}"></span>
                    </span>
                    <h3 th:text="${show.title}"></h3>
                    <p class="card-genres"
                       th:text="${#strings.listJoin(show.genres, ' · ')}"></p>
                </div>
            </a>
        </div>
    </div>
</section>

<!-- PELÍCULAS TRENDING -->
<section class="carousel-section">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Películas en tendencia</h2>
            <div class="carousel-controls">
                <button class="carousel-btn prev">‹</button>
                <button class="carousel-btn next">›</button>
            </div>
        </div>

        <div class="carousel">
            <a th:href="@{/peliculas/{id}(id=${movie.id})}" class="carousel-card"
               th:each="movie, iterStat : ${movies}">
                <div class="rank-badge" th:text="${iterStat.count}"></div>
                <img th:src="${movie.posterPath}" th:alt="${movie.title}">
                <div class="card-meta">
                    <span>
                        <i class="bi bi-star-fill"></i>
                        <span th:text="${movie.voteAverageFormatted}"></span>
                    </span>
                    <h3 th:text="${movie.title}"></h3>
                    <p class="card-genres"
                       th:text="${#strings.listJoin(movie.genres, ' · ')}"></p>
                </div>
            </a>
        </div>
    </div>
</section>

<!-- EN CARTELERA -->
<section class="carousel-section">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Ahora en cines</h2>
            <div class="carousel-controls">
                <button class="carousel-btn prev">‹</button>
                <button class="carousel-btn next">›</button>
            </div>
        </div>

        <div class="carousel">
            <a th:href="@{/peliculas/{id}(id=${movie.id})}" class="carousel-card"
               th:each="movie : ${nowPlayingMovies}">
                <img th:src="${movie.posterPath}" th:alt="${movie.title}">
                <div class="card-meta">
                    <span>
                        <i class="bi bi-star-fill"></i>
                        <span th:text="${movie.voteAverageFormatted}"></span>
                    </span>
                    <h3 th:text="${movie.title}"></h3>
                    <p class="card-genres"
                       th:text="${#strings.listJoin(movie.genres, ' · ')}"></p>
                </div>
            </a>
        </div>
    </div>
</section>

<!-- MEJOR VALORADAS -->
<section class="carousel-section">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title"
                th:text="'Películas mejor valoradas de ' + ${lastYear}"></h2>
            <div class="carousel-controls">
                <button class="carousel-btn prev">‹</button>
                <button class="carousel-btn next">›</button>
            </div>
        </div>

        <div class="carousel">
            <a th:href="@{/peliculas/{id}(id=${movie.id})}" class="carousel-card"
               th:each="movie : ${bestMoviesYear}">
                <img th:src="${movie.posterPath}" th:alt="${movie.title}">
                <div class="card-meta">
                    <span>
                        <i class="bi bi-star-fill"></i>
                        <span th:text="${movie.voteAverageFormatted}"></span>
                    </span>
                    <h3 th:text="${movie.title}"></h3>
                    <p class="card-genres"
                       th:text="${#strings.listJoin(movie.genres, ' · ')}"></p>
                </div>
            </a>
        </div>
    </div>
</section>

<!-- PELIS Y SERIES CONFORT PLACE (que siempre funcionan) -->
<section class="carousel-section">
    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Siempre funcionan...</h2>
            <div class="carousel-controls">
                <button class="carousel-btn prev">‹</button>
                <button class="carousel-btn next">›</button>
            </div>
        </div>

        <div class="carousel">

            <a th:each="item : ${comfortContent}"
               th:href="${item.urlPath}"
               class="carousel-card">

                <img th:src="${item.posterPath}" th:alt="${item.title}">

                <div class="card-meta">
                    <span>
                        <i class="bi bi-star-fill"></i>
                    <span th:text="${item.voteAverageFormatted}"></span>
                    </span>

                    <h3 th:text="${item.title}"></h3>

                    <p class="card-genres"
                       th:text="${#strings.listJoin(item.genres, ' · ')}"></p>

                </div>

            </a>

        </div>
    </div>
</section>
<footer th:replace="fragments/footer :: footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/carousel.js}"></script>
<script th:src="@{/js/main.js}"></script>
<th:block th:replace="~{fragments/trailer-modal :: trailerModal}"></th:block>
</body>
</html>
