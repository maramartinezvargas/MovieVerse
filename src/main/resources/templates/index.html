<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('MovieVerse')"></head>

<body>

    <th:block th:replace="fragments/header :: header"></th:block>

    <!-- HERO -->
    <section class="hero" th:if="${featured != null and featured.backdropPath != null}"
        th:style="|--hero-bg: url('${featured.backdropPath}')|">

        <div class="container">
            <div class="hero-content">
                <span class="hero-badge">Destacado</span>
                <h1 class="hero-title" th:text="${featured.title}">
                </h1>
                <div class="hero-meta">
                    <span class="rating">
                        <i class="bi bi-star-fill"></i>
                        <span th:text="${featured.voteAverageFormatted}"></span> / 10
                        <small>(<span th:text="${featured.voteCount}"></span> votos)</small>
                    </span>

                    <span class="genre" th:each="genre : ${featured.genres}" th:text="${genre}">
                    </span>

                </div>

                <p class="hero-overview" th:text="${featured.overview}">
                </p>

                <div class="hero-actions">
                    <a th:href="@{/peliculas/{id}(id=${featured.id})}" class="btn btn-secondary">
                        Ver detalles
                    </a>

                    <a href="#" class="btn btn-secondary">
                        Ver tráiler
                    </a>
                </div>

            </div>
        </div>

    </section>

    <!-- TENDENCIAS · SERIES -->
    <section class="carousel-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Series en tendencia</h2>
                <div class="carousel-controls">
                    <button class="carousel-btn prev">‹</button>
                    <button class="carousel-btn next">›</button>
                </div>
            </div>
            <div class="carousel" id="top-tv-carousel">
                <article class="carousel-card" th:each="show, iterStat : ${tvShows}">
                    <div class="rank-badge" th:text="${iterStat.count}">
                    </div>
                    <img th:src="${show.posterPath}" th:alt="${show.title}">
                    <div class="card-meta">
                        <span>
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${show.voteAverageFormatted}"></span>
                        </span>
                        <h3 th:text="${show.title}"></h3>
                        <p class="card-genres" th:text="${#strings.listJoin(show.genres, ' · ')}">
                        </p>
                    </div>
                </article>

            </div>

        </div>

    </section>

    <!-- EN CARTELERA · PELÍCULAS -->
    <section class="carousel-section">

        <div class="container">

            <div class="section-header">
                <h2 class="section-title">En cartelera</h2>

                <div class="carousel-controls">
                    <button class="carousel-btn prev">‹</button>
                    <button class="carousel-btn next">›</button>
                </div>
            </div>

            <div class="carousel" id="now-playing-carousel">
                <a th:href="@{/peliculas/{id}(id=${movie.id})}" class="carousel-card"
                    th:each="movie : ${nowPlayingMovies}">
                    <img th:src="${movie.posterPath}" th:alt="${movie.title}">
                    <div class="card-meta">
                        <span>
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${movie.voteAverageFormatted}"></span>
                        </span>
                        <h3 th:text="${movie.title}"></h3>
                        <p class="card-genres" th:text="${#strings.listJoin(movie.genres, ' · ')}">
                        </p>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <!-- MEJOR VALORADAS DEL AÑO -->
    <section class="carousel-section">

        <div class="container">

            <div class="section-header">

                <h2 class="section-title" th:text="'Mejor valoradas de ' + ${lastYear}">
                </h2>

                <div class="carousel-controls">
                    <button class="carousel-btn prev">‹</button>
                    <button class="carousel-btn next">›</button>
                </div>

            </div>

            <div class="carousel" id="best-year-carousel">

                <a th:href="@{/peliculas/{id}(id=${movie.id})}" class="carousel-card"
                    th:each="movie, iterStat : ${bestMoviesYear}">

                    <div class="rank-badge" th:text="${iterStat.count}">
                    </div>

                    <img th:src="${movie.posterPath}" th:alt="${movie.title}">

                    <div class="card-meta">

                        <span>
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${movie.voteAverageFormatted}"></span>
                        </span>

                        <h3 th:text="${movie.title}"></h3>

                        <p class="card-genres" th:text="${#strings.listJoin(movie.genres, ' · ')}">
                        </p>

                    </div>

                </a>

            </div>

        </div>

    </section>

    <!-- TENDENCIAS · PELÍCULAS -->
    <section class="carousel-section">

        <div class="container">

            <div class="section-header">

                <h2 class="section-title">
                    Películas en tendencia
                </h2>

                <div class="carousel-controls">
                    <button class="carousel-btn prev">‹</button>
                    <button class="carousel-btn next">›</button>
                </div>

            </div>

            <div class="carousel" id="top-movies-carousel">

                <a th:href="@{/peliculas/{id}(id=${movie.id})}" class="carousel-card"
                    th:each="movie, iterStat : ${movies}">

                    <div class="rank-badge" th:text="${iterStat.count}">
                    </div>

                    <img th:src="${movie.posterPath}" th:alt="${movie.title}">

                    <div class="card-meta">

                        <span>
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${movie.voteAverageFormatted}"></span>
                        </span>

                        <h3 th:text="${movie.title}"></h3>

                        <p class="card-genres" th:if="${movie.genres != null}"
                            th:text="${#strings.listJoin(movie.genres, ' · ')}">
                        </p>

                    </div>

                </a>

            </div>

        </div>

    </section>

    <!-- SERIES EN EMISIÓN -->
    <section class="carousel-section">

        <div class="container">

            <div class="section-header">

                <h2 class="section-title">
                    Series en emisión
                </h2>

                <div class="carousel-controls">
                    <button class="carousel-btn prev">‹</button>
                    <button class="carousel-btn next">›</button>
                </div>

            </div>

            <div class="carousel" id="upcoming-tv-carousel">

                <article class="carousel-card" th:each="show : ${upcomingSeries}">

                    <img th:src="${show.posterPath}" th:alt="${show.title}">

                    <div class="card-meta">

                        <span>
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${show.voteAverageFormatted}"></span>
                        </span>

                        <h3 th:text="${show.title}"></h3>

                        <p class="card-genres" th:text="${#strings.listJoin(show.genres, ' · ')}">
                        </p>

                        <p class="card-date" th:if="${show.seasonNumber != null and show.seasonNumber > 0}"
                            th:text="'Temporada ' + ${show.seasonNumber}">
                        </p>

                    </div>

                </article>

            </div>

        </div>

    </section>
    <footer th:replace="fragments/footer :: footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/carousel.js}"></script>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
