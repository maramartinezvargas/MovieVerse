<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>

<div th:fragment="reviewModal(mediaId, mediaType, review, title, posterPath)"
     th:id="${review != null
        ? 'editReviewModal-' + review.id
        : 'reviewModal-' + mediaId}"
     class="modal fade review-modal"
     tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-pencil-fill"></i>
                    <span th:text="${review != null
                        ? 'Editar reseña'
                        : 'Escribir reseña'}">
                    </span>
                </h5>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>

            <!-- USUARIO LOGUEADO -->
            <div sec:authorize="isAuthenticated()">

                <!-- Si ya existe una reseña, precargar los datos. Si no, el formulario estará vacío para crear una nueva reseña -->
                <form th:action="${review != null}
                    ? @{/reviews/edit/{id}(id=${review.id})}
                    : @{/reviews}"
                      method="post">


                    <input type="hidden" name="mediaId" th:value="${mediaId}" />
                    <input type="hidden" name="mediaType" th:value="${mediaType}" />
                    <input type="hidden" name="title" th:value="${title}">
                    <input type="hidden" name="posterPath" th:value="${posterPath}">

                    <div class="modal-body">

                        <!-- RATING -->
                        <div class="review-field">
                            <label>¿Qué nota le das?</label>

                            <div class="star-rating">
                                <input type="hidden"
                                       name="rating"
                                       class="rating-input"
                                       th:value="${review != null and review.rating != null ? review.rating : 0}"
                                       required>
                                <i class="bi bi-star star" data-value="1"></i>
                                <i class="bi bi-star star" data-value="2"></i>
                                <i class="bi bi-star star" data-value="3"></i>
                                <i class="bi bi-star star" data-value="4"></i>
                                <i class="bi bi-star star" data-value="5"></i>
                                <i class="bi bi-star star" data-value="6"></i>
                                <i class="bi bi-star star" data-value="7"></i>
                                <i class="bi bi-star star" data-value="8"></i>
                                <i class="bi bi-star star" data-value="9"></i>
                                <i class="bi bi-star star" data-value="10"></i>
                                <span class="rating-value">0/10</span>
                            </div>
                        </div>
                        <span class="rating-error-text">
                            Selecciona una puntuación
                        </span>

                        <!-- COMMENT -->
                        <div class="review-field">
                            <label>Tu opinión</label>

                            <textarea name="comment"
                                      th:text="${review != null ? review.comment : ''}"
                                      class="form-control custom-textarea"
                                      rows="4"
                                      placeholder="Comparte tu opinión..."
                                      required></textarea>
                        </div>

                    </div>


                    <!-- FOOTER -->
                    <div class="modal-footer">

                        <button type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal">
                            Cancelar
                        </button>

                        <button type="submit"
                                class="btn btn-action btn-review">
                            <span th:text="${review != null}
                                ? 'Guardar cambios'
                                : 'Publicar'">
                            </span>
                        </button>

                    </div>

                </form>
            </div>

            <!-- USUARIO NO LOGUEADO -->
            <div sec:authorize="!isAuthenticated()"
                 class="modal-body text-center">

                <p>Inicia sesión para poder escribir una reseña.</p>

                <a th:href="@{/login(redirect=${currentUrl})}"
                   class="btn-pill btn-action btn-review">
                    <i class="bi bi-person"></i> Iniciar sesión
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
