<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head(${movie.title})}"></head>

<body th:data-authenticated="${#authorization.expression('isAuthenticated()')}">

<th:block th:replace="~{fragments/header :: header}"></th:block>

    <div class="flash-container">

        <div th:if="${error}" class="flash-alert error">
            <span th:text="${error}"></span>
            <button class="flash-close">&times;</button>
        </div>

        <div th:if="${successMessage}" class="flash-alert success">
            <span th:text="${successMessage}"></span>
            <button class="flash-close">&times;</button>
        </div>

    </div>
    <!-- Movie Hero Section -->
    <section class="media-hero" th:if="${movie.backdropPath != null}"
             th:style="|--media-bg: url('${movie.backdropPath}')|">
        <div class="container">
            <div class="media-layout">
                <img class="media-poster" th:src="${movie.posterPath}" th:alt="${movie.title}">
                <div class="media-info">
                    <h1 class="media-hero-title" th:text="${movie.title}"></h1>
                    <div class="media-meta">
                        <!-- Línea 1 -->
                        <div class="movie-meta-top">
                            <span class="rating">
                                <i class="bi bi-star-fill"></i>
                                <span class="rating-value" th:text="${movie.voteAverageFormatted}"></span>
                                <span class="rating-count"
                                      th:text="'(' + ${movie.voteCount} + ' votos en TMDB)'">
                                </span>
                            </span>
                            <span class="runtime"
                                  th:if="${movie.runtime != null}"
                                  th:text="${movie.formattedRuntime}">
                            </span>
                            <span class="release-date"
                                  th:if="${movie.releaseDate != null and !#strings.isEmpty(movie.releaseDate)}"
                                  th:text="${movie.formattedReleaseDate}">
                            </span>

                        </div>

                        <!-- Línea 2 -->
                        <div class="media-genres">
                            <span class="genre"
                                  th:each="genre : ${movie.genres}"
                                  th:text="${genre}">
                            </span>
                        </div>

                    </div>
                    <p class="media-overview" th:text="${movie.overview}">
                    </p>
                    <!-- Acciones (tráiler, like, lista) -->
                    <div class="media-actions">

                        <!-- TRAILER -->
                        <button
                                class="btn-pill btn-action open-trailer"
                                th:if="${movie.trailerKey != null}"
                                th:attr="data-trailer=${movie.trailerKey}"
                                data-bs-toggle="modal"
                                data-bs-target="#trailerModal">

                            <i class="bi bi-play-fill"></i>
                            Ver tráiler
                        </button>

                        <!-- LIKE -->
                        <button id="likeBtn"
                                class="btn-pill btn-details btn-like"
                                th:classappend="${liked} ? ' liked'"
                                th:data-media-id="${movie.id}"
                                th:data-authenticated="${#authorization.expression('isAuthenticated()')}"
                                data-media-type="MOVIE">

                            <i class="bi"
                               th:classappend="${liked} ? ' bi-heart-fill' : ' bi-heart'"></i>

                            <span id="likeCount" th:text="${totalLikes}">0</span>

                            <span>Me gusta</span>
                        </button>

                        <!-- Estado: visto / pendiente -->
                        <div class="media-status-wrapper"
                             th:data-media-id="${movie.id}"
                             data-media-type="MOVIE"
                             th:data-title="${movie.title}"
                             th:data-poster-path="${movie.posterPath}"
                             th:data-vote-average="${movie.voteAverage}">

                            <button class="btn-pill btn-details btn-status"
                                    id="statusBtn">

                                <!-- Icono dinámico -->
                                <i th:if="${currentStatus == null}"
                                   class="bi bi-bookmark-plus">
                                </i>

                                <i th:if="${currentStatus != null and currentStatus.status.name() == 'WATCHED'}"
                                   class="bi bi-eye-fill">
                                </i>

                                <i th:if="${currentStatus != null and currentStatus.status.name() == 'WATCHLIST'}"
                                   class="bi bi-clock-fill">
                                </i>

                                <!-- Texto dinámico -->
                                <span th:if="${currentStatus == null}">Guardar</span>
                                <span th:if="${currentStatus != null and currentStatus.status.name() == 'WATCHED'}">Vista</span>
                                <span th:if="${currentStatus != null and currentStatus.status.name() == 'WATCHLIST'}">Pendiente</span>

                            </button>

                            <div class="status-dropdown">

                                <button class="status-option"
                                        data-status="WATCHED">

                                    <i class="bi bi-eye"></i>
                                    Marcar como vista

                                </button>

                                <button class="status-option"
                                        data-status="WATCHLIST">

                                    <i class="bi bi-clock"></i>
                                    Añadir a pendientes

                                </button>

                            </div>

                        </div>

                    </div>
                    <!-- Proveedores de streaming -->
                    <div class="media-providers"
                         th:if="${providers != null and !#lists.isEmpty(providers)}">

                        <span class="providers-label">Disponible en:</span>

                        <div class="providers-list">
                            <th:block th:each="p : ${providers}">

                                <a th:if="${p.link != null}"
                                   class="provider-item"
                                   th:href="${p.link}"
                                   target="_blank">

                                    <img th:src="'https://image.tmdb.org/t/p/w45' + ${p.logoPath}"
                                         th:alt="${p.name}"
                                         class="provider-logo"/>

                                    <span class="provider-tooltip"
                                          th:text="${p.name}"></span>
                                </a>

                                <div th:if="${p.link == null}"
                                     class="provider-item no-link">

                                    <img th:src="'https://image.tmdb.org/t/p/w45' + ${p.logoPath}"
                                         th:alt="${p.name}"
                                         class="provider-logo"/>

                                    <span class="provider-tooltip"
                                          th:text="${p.name}"></span>
                                </div>

                            </th:block>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Detalles técnicos -->
    <section class="media-details-section">
        <div class="container">

            <h2 class="section-title">
                Detalles técnicos
            </h2>

            <div class="media-details-grid">

                <div class="detail-item" th:if="${directors != null}">
                <span class="label">
                    <i class="bi bi-camera-reels"></i> Dirección
                </span>
                    <span th:text="${directors}"></span>
                </div>

                <div class="detail-item" th:if="${writers != null}">
                <span class="label">
                    <i class="bi bi-pencil-square"></i> Guion
                </span>
                    <span th:text="${writers}"></span>
                </div>

                <div class="detail-item" th:if="${composer != null}">
                <span class="label">
                    <i class="bi bi-music-note-beamed"></i> Música
                </span>
                    <span th:text="${composer}"></span>
                </div>

                <div class="detail-item" th:if="${cinematography != null}">
                <span class="label">
                    <i class="bi bi-camera"></i> Fotografía
                </span>
                    <span th:text="${cinematography}"></span>
                </div>

                <div class="detail-item" th:if="${movie.productionCompanies != null}">
                <span class="label">
                    <i class="bi bi-building"></i> Productoras
                </span>
                    <span th:text="${#strings.listJoin(movie.productionCompanies, ', ')}"></span>
                </div>

                <div class="detail-item" th:if="${movie.productionCountries != null}">
                <span class="label">
                    <i class="bi bi-globe"></i> País
                </span>
                    <span th:text="${#strings.listJoin(movie.productionCountries, ', ')}"></span>
                </div>

                <div class="detail-item" th:if="${movie.originalLanguage != null}">
                <span class="label">
                    <i class="bi bi-translate"></i> Idioma original
                </span>
                    <span th:text="${movie.originalLanguage}"></span>
                </div>

            </div>
        </div>
    </section>

    <!-- REPARTO -->
    <section class="carousel-section"
             th:if="${cast != null and #lists.size(cast) > 0}">

        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Reparto principal</h2>
                <div class="carousel-controls">
                    <button class="carousel-btn prev">‹</button>
                    <button class="carousel-btn next">›</button>
                </div>
            </div>

            <div class="carousel" id="cast-carousel">
                <div class="carousel-card cast-card"
                     th:each="actor : ${cast}">
                    <div class="cast-avatar">

                        <!-- Imagen si existe -->
                        <img th:if="${actor.profilePath != null}"
                             th:src="${actor.profilePath}"
                             th:alt="${actor.name}">

                        <!-- Placeholder si NO existe -->
                        <div class="avatar-placeholder"
                             th:if="${actor.profilePath == null}">
                            <i class="bi bi-person"></i>
                        </div>

                    </div>
                    <div class="cast-meta">
                        <h3 th:text="${actor.name}"></h3>
                        <p th:text="${actor.character}"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- RESEÑAS -->
    <section class="reviews-section" th:if="${reviews != null}">
        <div class="container">

            <div class="reviews-header">
                <h2 class="section-title">Reseñas</h2>

                <!-- SIEMPRE visible -->
                <button class="btn-pill btn-action btn-review"
                        data-bs-toggle="modal"
                        th:data-bs-target="${'#reviewModal-' + movie.id}">
                    <i class="bi bi-pencil-fill"></i>
                    <span th:if="${#authorization.expression('isAuthenticated()')}">
                        Escribir reseña
                    </span>

                                        <span th:if="${!#authorization.expression('isAuthenticated()')}">
                        Inicia sesión para reseñar
                    </span>
                </button>

            </div>

            <div th:if="${#lists.isEmpty(reviews)}" class="no-reviews">

                <p class="no-reviews-text">
                    Nadie ha reseñado aún este título.
                </p>

            </div>

            <div class="reviews-layout"
                 th:if="${!#lists.isEmpty(reviews)}">

                <!-- COLUMNA IZQUIERDA -->
                <div class="reviews-summary">

                    <!-- TMDB -->
                    <div class="reviews-main-score">
                        <div class="reviews-score-big"
                             th:text="${movie.voteAverageFormatted}"></div>

                        <div class="reviews-count"> En TMDB</div>

                        <div class="reviews-stars"
                             th:with="stars=${movie.stars}">

                            <i class="bi bi-star-fill"
                               th:each="i : ${#numbers.sequence(1, stars)}"></i>

                            <i class="bi bi-star"
                               th:if="${stars < 10}"
                               th:each="i : ${#numbers.sequence(stars + 1, 10)}"></i>

                        </div>
                    </div>

                    <!-- USERS -->
                    <div class="reviews-user-score" th:if="${localReviewCount > 0}">

                        <div class="reviews-user-value">
                            <i class="bi bi-people-fill"></i>
                            <span th:text="${#numbers.formatDecimal(avgRating, 1, 1)}"></span>
                        </div>

                        <div class="reviews-user-label">
                            Valoración de la comunidad
                        </div>



                    </div>
                    <div class="reviews-count">
                        <span th:text="${reviewCount}"></span> reseñas
                    </div>

                </div>

                <!-- COLUMNA DERECHA -->
                <div class="reviews-list">

                    <th:block th:each="review, iterStat : ${reviews}">
                        <div class="review-card"
                         th:classappend="${iterStat.index > 0} ? ' hidden-review'">

                        <div class="review-top">

                            <!-- IZQUIERDA -->
                            <div class="review-user-info">

                                <div class="review-avatar">

                                    <img th:if="${review.avatarUrl != null}"
                                         th:src="${review.avatarUrl}"
                                         th:alt="${review.username}"
                                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">

                                    <div class="review-avatar avatar-placeholder"
                                         th:if="${review.avatarUrl == null}">
                                        <i class="bi bi-person"></i>
                                    </div>

                                </div>

                                <div>
                                    <div class="review-name">
                                        <span class="review-username" th:text="'@' + ${review.username}"></span>
                                        <span class="user-badge"
                                              th:classappend="${review.source == 'TMDB'} ? ' badge-tmdb' : ' badge-local'"
                                              th:text="${review.source == 'TMDB'} ? 'Usuario TMDB' : 'Usuario MovieVerse'">
                                        </span>
                                    </div>
                                </div>

                            </div>

                            <!-- DERECHA -->
                            <div class="review-meta-right">

                                <div class="review-stars"
                                     th:if="${review.rating != null}"
                                     th:with="stars=${T(java.lang.Math).floor(review.rating)}">

                                    <i class="bi bi-star-fill"
                                       th:each="i : ${#numbers.sequence(1, stars)}"></i>

                                    <i class="bi bi-star"
                                       th:if="${stars < 10}"
                                       th:each="i : ${#numbers.sequence(stars + 1, 10)}"></i>

                                    <span class="review-rating"
                                          th:text="${review.rating}"></span>
                                </div>

                                <div class="review-date"
                                     th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}">
                                </div>
                                <div class="review-actions">

                                    <!-- REVIEW PROPIA -->
                                    <th:block th:if="${review.source == 'LOCAL' and #authentication.name == review.username}">
                                        <!-- DELETE -->
                                        <form th:action="@{/reviews/delete/{id}(id=${review.id})}"
                                              method="post">
                                            <button type="submit"
                                                    class="review-action-btn delete-review-btn">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>

                                        <!-- EDIT -->
                                        <button type="button"
                                                class="review-action-btn"
                                                data-bs-toggle="modal"
                                                th:data-bs-target="'#reviewModal-' + ${movie.id}">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                    </th:block>

                                    <!-- REVIEW AJENA / REPORT -->
                                    <button type="button"
                                            class="review-action-btn report-review-btn"
                                            data-bs-toggle="modal"
                                            th:data-bs-target="'#reportModal-' + ${review.id}"
                                            th:if="${review.source == 'LOCAL' and #authentication.name != review.username}">
                                        <i class="bi bi-flag"></i>
                                    </button>

                                </div>
                            </div>


                        </div>

                        <p class="review-text" th:text="${review.comment}"></p>

                        <div class="review-footer">
                            <button class="read-more-btn" onclick="toggleReview(event, this)">
                                <span class="label">Leer más</span>
                                <i class="bi bi-chevron-down"></i>
                            </button>
                        </div>
                    </div>
                        <div sec:authorize="isAuthenticated()">
                            <th:block th:replace="
                                ~{fragments/report-review-modal :: reportModal(${review})}">
                            </th:block>
                        </div>
                        <th:block th:if="${review.source == 'LOCAL' and #authentication.name == review.username}">
<!--                            <th:block th:replace="~{fragments/review-modal :: reviewModal(
                                    ${movie.id},
                                    'MOVIE',
                                    ${review},
                                    ${movie.title},
                                    ${movie.posterPath}
                                )}">
                            </th:block>-->
                        </th:block>
                    </th:block>
                    <!-- BOTÓN VER MÁS -->
                    <div class="reviews-load-more"
                         th:if="${#lists.size(reviews) > 1}">

                        <button id="toggle-reviews-btn" class="btn-pill btn-action">
                            <i class="bi bi-chevron-down"></i>
                            Ver más reseñas
                        </button>

                    </div>
                </div>

            </div>

        </div>
    </section>
    <!-- Peliculas relacionadas -->
    <section class="carousel-section" th:if="${relatedMovies != null and #lists.size(relatedMovies) > 0}">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">
                    Si te gustó "<span th:text="${movie.title}"></span>", te puede gustar...
                </h2>
                <div class="carousel-controls">
                    <button class="carousel-btn prev">‹</button>
                    <button class="carousel-btn next">›</button>
                </div>
            </div>

            <div class="carousel" id="related-carousel">
                <a th:href="@{/peliculas/{id}(id=${related.id})}"
                   class="carousel-card"
                   th:each="related : ${relatedMovies}">

                    <img th:src="${related.posterPath}"
                         th:alt="${related.title}">

                    <div class="card-meta">

                        <span>
                            <i class="bi bi-star-fill"></i>
                            <span class="rating-value" th:text="${related.voteAverageFormatted}"></span>
                        </span>

                        <h3 th:text="${related.title}"></h3>

                        <p class="card-genres"
                           th:text="${#strings.listJoin(related.genres, ' · ')}">
                        </p>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <!-- Modal review -->
    <th:block th:replace="~{fragments/review-modal :: reviewModal(
        ${movie.id},
        'MOVIE',
        ${null},
        ${movie.title},
        ${movie.posterPath}
    )}">
    </th:block>


    <!-- Modal trailer -->
    <th:block th:replace="~{fragments/trailer-modal :: trailerModal}"></th:block>

    <!-- Footer -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/carousel.js}"></script>
    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/reviews.js}"></script>
    <script th:src="@{/js/likes.js}"></script>
    <script th:src="@{/js/status.js}"></script>
</body>


</html>
