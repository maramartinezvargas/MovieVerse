<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head(${movie.title})"></head>

<body>

    <th:block th:replace="fragments/header :: header"></th:block>

    <!-- Movie Hero Section -->
    <section class="movie-hero" th:if="${movie.backdropPath != null}"
        th:style="|--movie-bg: url('${movie.backdropPath}')|">
        <div class="container">
            <div class="movie-layout">
                <img class="movie-poster" th:src="${movie.posterPath}" th:alt="${movie.title}">
                <div class="movie-info">
                    <h1 class="movie-hero-title" th:text="${movie.title}"></h1>
                    <div class="movie-meta">
                        <!-- Línea 1 -->
                        <div class="movie-meta-top">
                            <span class="rating">
                                <i class="bi bi-star-fill"></i>
                                <span class="rating-value" th:text="${movie.voteAverageFormatted}"></span>
                                <span class="rating-count"
                                      th:text="'(' + ${movie.voteCount} + ' votos en TMDB)'">
                                </span>
                            </span>
                            <span class="runtime"
                                  th:if="${movie.runtime != null}"
                                  th:text="${movie.formattedRuntime}">
                            </span>
                            <span class="release-date"
                                  th:if="${movie.releaseDate != null and !#strings.isEmpty(movie.releaseDate)}"
                                  th:text="${movie.formattedReleaseDate}">
                            </span>

                        </div>

                        <!-- Línea 2 -->
                        <div class="movie-genres">
                            <span class="genre"
                                  th:each="genre : ${movie.genres}"
                                  th:text="${genre}">
                            </span>
                        </div>

                    </div>
                    <p class="movie-overview" th:text="${movie.overview}">
                    </p>
                    <!-- Acciones (tráiler, like, lista) -->
                    <div class="movie-actions">

                        <!-- TRAILER -->
                        <button
                                class="btn-pill btn-trailer open-trailer"
                                th:if="${movie.trailerKey != null}"
                                th:attr="data-trailer=${movie.trailerKey}"
                                data-bs-toggle="modal"
                                data-bs-target="#trailerModal">

                            <i class="bi bi-play-fill"></i>
                            Ver tráiler
                        </button>

                        <!-- LIKE -->
                        <button class="btn-pill btn-details btn-like">
                            <i class="bi bi-heart"></i>
                            Me gusta
                        </button>

                        <!-- LISTA -->
                        <button class="btn-pill btn-details">
                            <i class="bi bi-plus-lg"></i>
                            Añadir a lista
                        </button>

                    </div>
                    <!-- Proveedores de streaming -->
                    <div class="movie-providers"
                         th:if="${providers != null and !#lists.isEmpty(providers)}">

                        <span class="providers-label">Disponible en:</span>

                        <div class="providers-list">
                            <a class="provider-item"
                               th:each="p : ${providers}"
                               th:href="${p.link}"
                               th:attr="target=${p.link != '#'} ? '_blank' : null">

                                <img th:src="'https://image.tmdb.org/t/p/w45' + ${p.logoPath}"
                                     th:alt="${p.name}"
                                     class="provider-logo"/>

                                <span class="provider-tooltip" th:text="${p.name}"></span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Detalles técnicos -->
    <section class="movie-details-section">
        <div class="container">

            <h2 class="section-title">
                Detalles técnicos
            </h2>

            <div class="movie-details-grid">

                <div class="detail-item" th:if="${directors != null}">
                <span class="label">
                    <i class="bi bi-camera-reels"></i> Dirección
                </span>
                    <span th:text="${directors}"></span>
                </div>

                <div class="detail-item" th:if="${writers != null}">
                <span class="label">
                    <i class="bi bi-pencil-square"></i> Guion
                </span>
                    <span th:text="${writers}"></span>
                </div>

                <div class="detail-item" th:if="${composer != null}">
                <span class="label">
                    <i class="bi bi-music-note-beamed"></i> Música
                </span>
                    <span th:text="${composer}"></span>
                </div>

                <div class="detail-item" th:if="${cinematography != null}">
                <span class="label">
                    <i class="bi bi-camera"></i> Fotografía
                </span>
                    <span th:text="${cinematography}"></span>
                </div>

                <div class="detail-item" th:if="${movie.productionCompanies != null}">
                <span class="label">
                    <i class="bi bi-building"></i> Productoras
                </span>
                    <span th:text="${#strings.listJoin(movie.productionCompanies, ', ')}"></span>
                </div>

                <div class="detail-item" th:if="${movie.productionCountries != null}">
                <span class="label">
                    <i class="bi bi-globe"></i> País
                </span>
                    <span th:text="${#strings.listJoin(movie.productionCountries, ', ')}"></span>
                </div>

                <div class="detail-item" th:if="${movie.originalLanguage != null}">
                <span class="label">
                    <i class="bi bi-translate"></i> Idioma original
                </span>
                    <span th:text="${movie.originalLanguage}"></span>
                </div>

            </div>
        </div>
    </section>

    <!-- REPARTO -->
    <section class="carousel-section"
             th:if="${cast != null and #lists.size(cast) > 0}">

        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Reparto principal</h2>
                <div class="carousel-controls">
                    <button class="carousel-btn prev">‹</button>
                    <button class="carousel-btn next">›</button>
                </div>
            </div>

            <div class="carousel" id="cast-carousel">
                <div class="carousel-card cast-card"
                     th:each="actor : ${cast}">
                    <div class="cast-avatar">

                        <!-- Imagen si existe -->
                        <img th:if="${actor.profilePath != null}"
                             th:src="${actor.profilePath}"
                             th:alt="${actor.name}">

                        <!-- Placeholder si NO existe -->
                        <div class="avatar-placeholder"
                             th:if="${actor.profilePath == null}">
                            <i class="bi bi-person"></i>
                        </div>

                    </div>
                    <div class="cast-meta">
                        <h3 th:text="${actor.name}"></h3>
                        <p th:text="${actor.character}"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- RESEÑAS -->
    <section class="reviews-section"
             th:if="${reviews != null}">

        <div class="container">

            <div class="reviews-header">
                <h2 class="section-title">Reseñas</h2>
                <button class="btn-pill btn-trailer btn-review"
                        data-bs-toggle="modal"
                        data-bs-target="#reviewModal">
                    <i class="bi bi-pencil-fill"></i>
                    Escribir reseña
                </button>
            </div>

            <div th:if="${#lists.isEmpty(reviews)}" class="no-reviews">

                <p class="no-reviews-text">
                    Nadie ha reseñado aún este título.
                </p>

            </div>

            <div class="reviews-layout"
                 th:if="${!#lists.isEmpty(reviews)}">

                <!-- COLUMNA IZQUIERDA -->
                <div class="reviews-summary">

                    <!-- TMDB -->
                    <div class="reviews-main-score">
                        <div class="reviews-score-big"
                             th:text="${movie.voteAverageFormatted}"></div>

                        <div class="reviews-count"> En TMDB</div>

                        <div class="reviews-stars">
                            <i class="bi bi-star-fill"
                               th:each="i : ${#numbers.sequence(1, T(java.lang.Math).round(movie.voteAverage))}">
                            </i>
                            <i class="bi bi-star"
                               th:each="i : ${#numbers.sequence(T(java.lang.Math).round(movie.voteAverage)+1, 10)}">
                            </i>
                        </div>
                    </div>

                    <!-- USERS -->
                    <div class="reviews-user-score" th:if="${localReviewCount > 0}">

                        <div class="reviews-user-value">
                            <i class="bi bi-people-fill"></i>
                            <span th:text="${#numbers.formatDecimal(avgRating, 1, 1)}"></span>
                        </div>

                        <div class="reviews-user-label">
                            Valoración de la comunidad
                        </div>
                    </div>
                    <div class="reviews-count">
                        <span th:text="${reviewCount}"></span> reseñas
                    </div>

                </div>

                <!-- COLUMNA DERECHA -->
                <div class="reviews-list">

                    <div class="review-card"
                         th:each="review, iterStat : ${reviews}"
                         th:classappend="${iterStat.index > 0} ? ' hidden-review'">

                        <div class="review-top">

                            <!-- IZQUIERDA -->
                            <div class="review-user-info">

                                <div class="review-avatar">

                                    <img th:if="${review.avatarUrl != null}"
                                         th:src="${review.avatarUrl}"
                                         th:alt="${review.username}"
                                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">

                                    <div class="review-avatar avatar-placeholder"
                                         th:if="${review.avatarUrl == null}">
                                        <i class="bi bi-person"></i>
                                    </div>

                                </div>

                                <div>
                                    <div class="review-name">
                                        <span class="review-username" th:text="'@' + ${review.username}"></span>
                                        <span class="user-badge"
                                              th:classappend="${review.source == 'TMDB'} ? ' badge-tmdb' : ' badge-local'"
                                              th:text="${review.source == 'TMDB'} ? 'Usuario TMDB' : 'Usuario MovieVerse'">
                                        </span>
                                    </div>
                                </div>

                            </div>

                            <!-- DERECHA -->
                            <div class="review-meta-right">

                                <div class="review-stars" th:if="${review.rating != null}"
                                     th:with="stars=${T(java.lang.Math).floor(review.rating)}">

                                    <i class="bi bi-star-fill"
                                       th:each="i : ${#numbers.sequence(1, stars)}"></i>

                                    <i class="bi bi-star"
                                       th:each="i : ${#numbers.sequence(stars + 1, 10)}"></i>

                                    <span class="review-rating"
                                          th:text="${review.rating}"></span>
                                </div>

                                <div class="review-date"
                                     th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}">
                                </div>

                            </div>

                        </div>

                        <p class="review-text" th:text="${review.comment}"></p>

                        <div class="review-footer">
                            <button class="read-more-btn" onclick="toggleReview(this)">
                                <span class="label">Leer más</span>
                                <i class="bi bi-chevron-down"></i>
                            </button>
                        </div>
                    </div>
                    <!-- BOTÓN VER MÁS -->
                    <div class="reviews-load-more"
                         th:if="${#lists.size(reviews) > 1}">

                        <button id="toggle-reviews-btn" class="btn-pill btn-trailer">
                            <i class="bi bi-chevron-down"></i>
                            Ver más reseñas
                        </button>

                    </div>
                </div>

            </div>

        </div>
    </section>
    <!-- Peliculas relacionadas -->
    <section class="carousel-section" th:if="${relatedMovies != null and #lists.size(relatedMovies) > 0}">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">
                    Si te gustó "<span th:text="${movie.title}"></span>", te puede gustar...
                </h2>
                <div class="carousel-controls">
                    <button class="carousel-btn prev">‹</button>
                    <button class="carousel-btn next">›</button>
                </div>
            </div>

            <div class="carousel" id="related-carousel">
                <a th:href="@{/peliculas/{id}(id=${related.id})}"
                   class="carousel-card"
                   th:each="related : ${relatedMovies}">

                    <img th:src="${related.posterPath}"
                         th:alt="${related.title}">

                    <div class="card-meta">

                        <span>
                            <i class="bi bi-star-fill"></i>
                            <span class="rating-value" th:text="${related.voteAverageFormatted}"></span>
                        </span>

                        <h3 th:text="${related.title}"></h3>

                        <p class="card-genres"
                           th:text="${#strings.listJoin(related.genres, ' · ')}">
                        </p>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <!-- Modal para escribir reseña -->
    <div class="modal fade review-modal" id="reviewModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <!-- HEADER -->
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-pencil-fill"></i>
                        Escribir reseña
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <form th:action="@{/reviews}" method="post">

                    <div class="modal-body">

                        <input type="hidden" name="mediaId" th:value="${movie.id}" />

                        <!-- RATING -->
                        <div class="review-field">
                            <label>¿Qué nota le das?</label>

                            <div class="star-rating">

                                <input type="hidden" name="rating" class="rating-input" required>

                                <i class="bi bi-star star" data-value="1"></i>
                                <i class="bi bi-star star" data-value="2"></i>
                                <i class="bi bi-star star" data-value="3"></i>
                                <i class="bi bi-star star" data-value="4"></i>
                                <i class="bi bi-star star" data-value="5"></i>
                                <i class="bi bi-star star" data-value="6"></i>
                                <i class="bi bi-star star" data-value="7"></i>
                                <i class="bi bi-star star" data-value="8"></i>
                                <i class="bi bi-star star" data-value="9"></i>
                                <i class="bi bi-star star" data-value="10"></i>
                                <span class="rating-value">0/10</span>
                            </div>

                        </div>

                        <!-- COMMENT -->
                        <div class="review-field">
                            <label>Tu opinión</label>

                            <textarea name="comment"
                                      class="form-control custom-textarea"
                                      rows="4"
                                      placeholder="Comparte tu opinión sobre la película..."
                                      required></textarea>
                        </div>

                    </div>

                    <!-- FOOTER -->
                    <div class="modal-footer">

                        <button type="button"
                                class="btn btn-secondary"
                                data-bs-dismiss="modal">
                            Cancelar
                        </button>

                        <button type="submit"
                                class="btn btn-trailer btn-review">
                            Publicar
                        </button>

                    </div>

                </form>

            </div>
        </div>
    </div>


    <footer th:replace="fragments/footer :: footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/carousel.js}"></script>
    <script th:src="@{/js/main.js}"></script>
</body>
<th:block th:replace="~{fragments/trailer-modal :: trailerModal}"></th:block>
</html>
