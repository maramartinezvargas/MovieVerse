<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head(${movie.title})"></head>

<body>

    <th:block th:replace="fragments/header :: header"></th:block>

    <!-- Movie Hero Section -->
    <section class="movie-hero" th:if="${movie.backdropPath != null}"
        th:style="|--movie-bg: url('${movie.backdropPath}')|">
        <div class="container">
            <div class="movie-layout">
                <img class="movie-poster" th:src="${movie.posterPath}" th:alt="${movie.title}">
                <div class="movie-info">
                    <h1 class="movie-hero-title" th:text="${movie.title}"></h1>
                    <div class="movie-meta mb-1 d-flex align-items-center gap-3">
                        <span>
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${movie.voteAverageFormatted}"></span>
                            (<span th:text="${movie.voteCount}"></span> votos)
                        </span>
                        <p class="release-date" th:if="${movie.releaseDate != null}">
                            Fecha de estreno: <span th:text="${movie.releaseDate}"></span>
                        </p>
                    </div>
                    <div class="movie-genres mb-2 mt-2 align-items-center gap-2">
                        <span class="genre " th:each="genre : ${movie.genres}" th:text="${genre}">
                        </span>
                    </div>
                    <p class="movie-overview" th:text="${movie.overview}">
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- Peliculas relacionadas -->
    <section class="carousel-section" th:if="${relatedMovies != null and #lists.size(relatedMovies) > 0}">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Películas relacionadas</h2>
                <div class="carousel-controls">
                    <button class="carousel-btn prev">‹</button>
                    <button class="carousel-btn next">›</button>
                </div>
            </div>

            <div class="carousel" id="related-carousel">
                <a th:href="@{/peliculas/{id}(id=${related.id})}"
                   class="carousel-card"
                   th:each="related : ${relatedMovies}">

                    <img th:src="${related.posterPath}"
                         th:alt="${related.title}">

                    <div class="card-meta">

                        <span>
                            <i class="bi bi-star-fill"></i>
                            <span th:text="${related.voteAverageFormatted}"></span>
                        </span>

                        <h3 th:text="${related.title}"></h3>

                        <p class="card-genres"
                           th:text="${#strings.listJoin(related.genres, ' · ')}">
                        </p>
                    </div>
                </a>
            </div>
        </div>
    </section>
    <footer th:replace="fragments/footer :: footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/carousel.js}"></script>
    <script th:src="@{/js/main.js}"></script>

</body>

</html>
