<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Registro - MovieVerse')"></head>

<body>

<th:block th:replace="fragments/header :: header"></th:block>

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-card">

            <h1 class="auth-title">Crear cuenta</h1>

            <form th:action="@{/register}" method="post" th:object="${user}" class="auth-form">

                <!-- USERNAME -->
                <div class="input-group">
                    <i class="bi bi-person"></i>
                    <input type="text"
                           th:field="*{username}"
                           placeholder="Usuario"
                           required
                           minlength="3"
                           maxlength="20"
                           pattern="^[a-zA-Z0-9_]+$">
                </div>

                <!-- EMAIL -->
                <div class="input-group">
                    <i class="bi bi-envelope"></i>
                    <input type="email"
                           th:field="*{email}"
                           placeholder="Email"
                           required>
                </div>

                <!-- PASSWORD -->
                <div class="input-group">
                    <i class="bi bi-lock"></i>
                    <input type="password"
                           th:field="*{password}"
                           id="password"
                           placeholder="Contraseña"
                           required
                           minlength="4">
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="input-group">
                    <i class="bi bi-shield-lock"></i>
                    <input type="password"
                           name="confirmPassword"
                           id="confirmPassword"
                           placeholder="Repetir contraseña"
                           required>
                </div>

                <!-- CSRF para seguridad de Spring Security -->
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <!-- ERROR BACKEND -->
                <div th:if="${error}" class="auth-error" th:text="${error}"></div>

                <!-- BOTÓN -->
                <button type="submit" class="btn-pill btn-login-main">
                    <i class="bi bi-person-plus"></i>
                    Registrarse
                </button>

            </form>

            <!-- FOOTER -->
            <div class="auth-footer">
                <span>¿Ya tienes cuenta?</span>
                <a href="/login">Inicia sesión</a>
            </div>

        </div>

    </div>
</section>

<footer th:replace="fragments/footer :: footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/carousel.js}"></script>
<script th:src="@{/js/main.js}"></script>
<th:block th:replace="~{fragments/trailer-modal :: trailerModal}"></th:block>

</body>
</html>
