<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head('Explorar series')"></head>

<body class="explorer-theme">

<header th:replace="fragments/header :: header"></header>

<div class="explorer-header">
    <div class="container explorer-topbar">

        <div class="explorer-title-row">
            <h1>Explorar series</h1>

            <button id="toggle-filters" class="btn-filter btn-pill-ui">
                <i class="bi bi-funnel-fill"></i>
                Filtrar
            </button>
        </div>

        <div id="filters-container" class="filters-container">
            <div class="filters-bar">

                <!-- fila 1 -->
                <div class="filters-row">

                    <div class="filter-select custom-dropdown" data-target="year">
                        <label>Año</label>

                        <div class="dropdown-selected" id="year-selected">
                            Todos <i class="bi bi-chevron-down"></i>
                        </div>

                        <div class="dropdown-options hidden" id="year-options">
                            <div class="dropdown-option" data-value="">Todos</div>

                            <div class="dropdown-option"
                                 th:each="year : ${years}"
                                 th:attr="data-value=${year}"
                                 th:text="${year}">
                            </div>
                        </div>
                    </div>

                    <div class="filter-select custom-dropdown" data-target="genre">
                        <label>Género</label>

                        <div class="dropdown-selected" id="genre-selected">
                            Todos <i class="bi bi-chevron-down"></i>
                        </div>

                        <div class="dropdown-options hidden" id="genre-options">
                            <div class="dropdown-option" data-value="">Todos</div>

                            <div class="dropdown-option"
                                 th:each="entry : ${genres}"
                                 th:attr="data-value=${entry.key}"
                                 th:text="${entry.value}">
                            </div>
                        </div>
                    </div>

                </div>

                <!-- fila 2 -->
                <div class="filter-select custom-dropdown" data-target="sort">
                    <label>Ordenar por</label>

                    <div class="dropdown-selected" id="sort-selected">
                        Popularidad <i class="bi bi-chevron-down"></i>
                    </div>

                    <div class="dropdown-options hidden" id="sort-options">
                        <div class="dropdown-option active" data-value="popularity.desc">Popularidad</div>
                        <div class="dropdown-option" data-value="vote_average.desc">Mejor valoradas</div>
                        <div class="dropdown-option" data-value="vote_count.desc">Más votadas</div>
                        <div class="dropdown-option" data-value="first_air_date.desc">Más recientes</div>
                        <div class="dropdown-option" data-value="first_air_date.asc">Más antiguas</div>
                    </div>
                </div>

                <!-- rating -->
                <div class="filters-row">
                    <div class="filter-group">
                        <label>
                            <i class="bi bi-star-fill"></i>
                            Puntuación: <span id="rating-value">0</span>
                        </label>
                        <input type="range" id="filter-rating" min="0" max="10" step="0.5">
                    </div>
                </div>

                <!-- votos -->
                <div class="filters-row">
                    <div class="filter-group">
                        <label>
                            <i class="bi bi-people-fill"></i>
                            Votos: <span id="votes-value">0</span>
                        </label>
                        <input type="range" id="filter-votes" min="0" max="5000" step="100">
                    </div>
                </div>

                <!-- reset -->
                <div class="filters-row">
                    <div class="filter-select">
                        <label style="visibility: hidden;">Reset</label>

                        <button id="reset-filters" class="btn-pill-ui">
                            <i class="bi bi-arrow-counterclockwise"></i>
                            Resetear filtros
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<main class="container explorer-page">

    <div id="series-grid" class="movies-grid">
        <div class="movie-card" th:each="serie : ${series}">
            <a th:href="@{'/series/' + ${serie.id}}">
                <img th:src="${serie.posterPath}" alt="poster">
            </a>
        </div>
    </div>

    <div class="pagination">
        <button id="load-more-btn" class="btn-pill btn-action">
            <i class="bi bi-arrow-down-circle"></i>
            Mostrar más
        </button>
    </div>

</main>

<footer th:replace="fragments/footer :: footer"></footer>

<script th:src="@{/js/explorer.js}"></script>
<script th:src="@{/js/series.js}"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
