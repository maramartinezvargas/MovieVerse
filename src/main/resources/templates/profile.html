<!doctype html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="fragments/head :: head('Perfil')"></head>
<link rel="stylesheet" th:href="@{/css/profile.css}">
<body>

<th:block th:replace="fragments/header :: header"></th:block>

<!-- HERO PERFIL -->
<section class="profile-hero">

    <div class="container">
        <div class="media-layout">

            <!-- Avatar -->
            <!--<div class="profile-avatar">
                <i class="bi bi-person-circle"></i>
            </div>-->

            <!-- Info -->
            <div class="media-info">

                <h1 class="media-hero-title"
                    th:text="'@'+${user.username}"></h1>

                <div class="media-meta">

                    <div class="movie-meta-top">
                        <i class="bi bi-envelope profile-email-icon"></i>
                        <span class="release-date"
                              th:text="${user.email}">
                        </span>
                    </div>

                    <div class="media-genres">
                        <span class="genre" th:text="${user.role}"></span>
                    </div>

                </div>

                <!-- Stats -->
                <div class="media-actions profile-stats">

                    <div class="stat-box">
                        <span class="stat-number"
                              th:text="${#lists.size(user.reviews)}"></span>
                        <span class="stat-label">Reseñas</span>
                    </div>

                    <div class="stat-box">
                        <span class="stat-number"
                              th:text="${#lists.size(likedMedia)}"></span>
                        <span class="stat-label">Me gusta</span>
                    </div>

                </div>

            </div>
        </div>
    </div>
</section>

<section class="carousel-section">

    <div class="container">
        <div class="section-header">
            <h2 class="section-title">Te ha gustado
                <span th:text="'('+${#lists.size(likedMedia)}+')'"></span>
            </h2>

            <div class="carousel-controls">
                <button class="carousel-btn prev">‹</button>
                <button class="carousel-btn next">›</button>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(likedMedia)}"
             class="no-reviews">

            <p class="no-reviews-text">
                Aún no has dado me gusta a ningún título.
            </p>

        </div>

        <div class="carousel"
             th:if="${!#lists.isEmpty(likedMedia)}">

            <a th:each="item : ${likedMedia}"

               th:href="${item.mediaType == 'MOVIE'}
                    ? @{/peliculas/{id}(id=${item.mediaId})}
                    : @{/series/{id}(id=${item.mediaId})}"

               class="carousel-card">

                <img th:src="${item.posterPath}"
                     th:alt="${item.title}">

                <div class="card-meta">

                    <span class="card-rating">
                        <i class="bi bi-star-fill"></i>

                        <span
                                th:text="${#numbers.formatDecimal(item.voteAverage, 1, 1)}">
                        </span>
                    </span>

                    <h3 th:text="${item.title}"></h3>

                    <p class="card-genres media-type"
                       th:text="${item.mediaType == 'MOVIE'}
                            ? 'Película'
                            : 'Serie'">
                    </p>
                    <div class="liked-date">

                        <i class="bi bi-heart-fill profile-liked-icon"></i>

                        <p class="profile-liked-text"
                           th:text="'Te gustó el ' +
                            ${#temporals.format(item.createdAt, 'dd MMM yyyy')}">
                        </p>

                    </div>
                </div>

            </a>

        </div>

    </div>

</section>


<!-- LISTAS -->
<section class="carousel-section">
    <div class="container">

        <div class="section-header">
            <h2 class="section-title">Mis listas</h2>
        </div>

        <div th:if="${#lists.isEmpty(lists)}" class="no-reviews">
            <p class="no-reviews-text">
                Aún no tienes listas creadas.
            </p>
        </div>

        <div class="carousel"
             th:if="${!#lists.isEmpty(lists)}">

            <div class="carousel-card list-card"
                 th:each="list : ${lists}">

                <div class="card-meta">

                    <h3 th:text="${list.name}"></h3>

                    <p class="card-genres"
                       th:text="${list.type != null ? list.type : 'Lista'}">
                    </p>

                    <span>
                        <i class="bi bi-collection"></i>
                        <span th:text="${#lists.size(list.items)} + ' items'"></span>
                    </span>

                </div>

            </div>

        </div>

    </div>
</section>

<!-- REVIEWS -->
<!-- REVIEWS -->
<section class="reviews-section">
    <div class="container">

        <div class="reviews-header">
            <h2 class="section-title">
                Mis reseñas
                <span th:text="'(' + ${#lists.size(user.reviews)} + ')'"></span>
            </h2>
        </div>

        <div th:if="${#lists.isEmpty(user.reviews)}"
             class="no-reviews">

            <p class="no-reviews-text">
                Aún no has escrito ninguna review.
            </p>

        </div>

        <div class="reviews-list"
             th:if="${!#lists.isEmpty(profileReviews)}">

            <div class="profile-review-card"

                 th:each="review, iterStat : ${profileReviews}"

                 th:classappend="${iterStat.index > 1} ? ' hidden-review'">

                <!-- POSTER -->
                <!-- POSTER -->
                <a class="profile-review-poster"

                   th:href="${review.mediaType.name() == 'MOVIE'}
                        ? @{/peliculas/{id}(id=${review.mediaId})}
                        : @{/series/{id}(id=${review.mediaId})}">

                    <img th:if="${review.posterPath != null}"
                         th:src="${review.posterPath}"
                         th:alt="${review.title}">

                    <div th:if="${review.posterPath == null}"
                         class="profile-review-no-poster">

                        <i class="bi bi-film"></i>

                    </div>

                </a>

                <!-- CONTENT -->
                <div class="profile-review-content">

                    <div class="profile-review-header">

                        <a class="profile-review-title-link"

                           th:href="${review.mediaType.name() == 'MOVIE'}
                                ? @{/peliculas/{id}(id=${review.mediaId})}
                                : @{/series/{id}(id=${review.mediaId})}">

                            <h3 class="profile-review-title"
                                th:text="${review.title}">
                            </h3>

                        </a>

                        <div class="profile-review-meta">

                            <div class="profile-review-stars"
                                 th:if="${review.rating != null}"
                                 th:with="stars=${review.rating}">

                                <i class="bi bi-star-fill"
                                   th:each="i : ${#numbers.sequence(1, stars)}"></i>

                                <i class="bi bi-star"
                                   th:if="${stars < 10}"
                                   th:each="i : ${#numbers.sequence(stars + 1, 10)}"></i>

                                <span th:text="${review.rating}"></span>

                            </div>

                            <span class="profile-review-date"
                                  th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}">
                    </span>

                        </div>

                    </div>

                    <p class="profile-review-comment"
                       th:text="${review.comment}">
                    </p>

                    <div class="profile-review-footer"
                         th:if="${#strings.length(review.comment) > 180}">
                        <button class="read-more-btn"
                                onclick="toggleReview(event, this)">

                            <span class="label">Leer más</span>
                            <i class="bi bi-chevron-down"></i>

                        </button>

                    </div>

                </div>

            </div>

            <!-- VER MÁS -->
            <div class="reviews-load-more"
                 th:if="${#lists.size(profileReviews) > 2}">

                <button id="toggle-reviews-btn"
                        class="btn-pill btn-action">

                    <i class="bi bi-chevron-down"></i>
                    Ver más reseñas

                </button>

            </div>

        </div>

    </div>
</section>

<footer th:replace="fragments/footer :: footer"></footer>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/carousel.js}"></script>
<script th:src="@{/js/reviews.js}"></script>
</body>
</html>
