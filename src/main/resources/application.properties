# ----------------------------------------------------------
# CONFIGURACION DE LA APLICACION EN GENERAL
# Nombre de la aplicacion en Spring Boot
spring.application.name=tfgcine

# Puerto
server.port=8080

# Direccion de escucha del servidor (0.0.0.0 para aceptar conexiones desde cualquier IP)
server.address=0.0.0.0

# Deshabilitar la pagina de error Whitelabel de Spring Boot para mostrar errores personalizados
server.error.whitelabel.enabled=false

# -----------------------------------------------------------
# CONFIGURACION DE TMDB API

# Clave de API de TMDB (se debe haber establecido como variable de entorno)
tmdb.api.key=${TMDB_API_KEY}

# URL base para las solicitudes a la API de TMDB
tmdb.api.base=https://api.themoviedb.org/3

# URL base para las imagenes de TMDB
tmdb.image.base=https://image.tmdb.org/t/p/w500

# Idiomas para las solicitudes a la API de TMDB (espanol como primario, ingles como fallback)
tmdb.api.language.primary=es-ES
tmdb.api.language.fallback=en-US

# URL base para las imagenes de TMDB
tmdb.image.poster=https://image.tmdb.org/t/p/w500
tmdb.image.backdrop=https://image.tmdb.org/t/p/original

# ----------------------------------------------------------
# CONFIGURACION DE LA BASE DE DATOS (MySQL)

# URL de conexion (variable de entorno DB_URL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ----------------------------------------------------------
# CONFIGURACION JPA / HIBERNATE

# Valores posibles para ddl-auto:
# - validate: valida que el esquema coincida con las entidades (recomendado en produccion)
# - update: actualiza automaticamente el esquema (desarrollo)
# - create: crea el esquema desde cero en cada inicio
# - create-drop: crea al inicio y elimina al cerrar
spring.jpa.hibernate.ddl-auto=validate

# Mostrar las consultas SQL en la consola para depuracion (Util para debugging)
spring.jpa.show-sql=true

# Formatear las consultas SQL para mejor legibilidad en la consola
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------------------------
# CONFIGURACION DE SESION Y SEGURIDAD

# Tiempo de expiracion de la sesion (30 minutos)
server.servlet.session.timeout=30m

# Clave secreta para la funcionalidad de "remember me" en Spring Security
# (se debe haber establecido como variable de entorno)
security.remember-me.key=${REMEMBER_ME_KEY}