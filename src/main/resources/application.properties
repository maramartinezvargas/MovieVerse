# ===============================
# Application Configuration
spring.application.name=tfgcine
server.port=8080
server.address=0.0.0.0

# ===============================
# TMDB API Configuration
tmdb.api.key=${TMDB_API_KEY}

tmdb.api.base=https://api.themoviedb.org/3
tmdb.image.base=https://image.tmdb.org/t/p/w500
# TMDB API Language Settings
tmdb.api.language.primary=es-ES
tmdb.api.language.fallback=en-US
# TMDB Image URLs
tmdb.image.poster=https://image.tmdb.org/t/p/w500
tmdb.image.backdrop=https://image.tmdb.org/t/p/original

# ===============================
# DATABASE (MySQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ===============================
# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Logging Configuration
server.servlet.session.timeout=30m
security.remember-me.key=${REMEMBER_ME_KEY}